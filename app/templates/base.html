<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MYSGYM{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <script>
        window.MYSGYM_CONFIG = window.MYSGYM_CONFIG || {};
    </script>
    <script src="{{ url_for('static', filename='js/config.js') }}?v=20260423"></script>
    <script src="{{ url_for('static', filename='js/api.js') }}?v=20260423"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}?v=20260423"></script>
</head>
<body>
    <header class="topbar">
        <a class="topbar-brand" href="{{ url_for('home') }}">MYSGYM</a>
        <nav class="topbar-nav">
            <a class="{% if active_page == 'home' %}active{% endif %}" href="{{ url_for('home') }}">Resumen</a>
            {% for item in nav_items %}
                <a class="{% if active_page == item.key %}active{% endif %}" href="{{ item.url }}" data-nav-entity="{{ item.key }}">{{ item.title }}</a>
                {% endfor %}
                <a id="auth-link" href="/login">Login</a>
        </nav>
    </header>

    <main class="page">
        {% block body %}{% endblock %}
    </main>
    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const authLink = document.getElementById('auth-link');
        const token = ApiService.getToken && ApiService.getToken();
        const role = String((ApiService.getRole && ApiService.getRole()) || '').toLowerCase();
        const allowedEntitiesByRole = {
            cliente: new Set(['usuarios', 'reservas', 'pagos']),
            admin: new Set(['usuarios', 'empleados', 'salas', 'horarios', 'actividades', 'reservas', 'material', 'incidencias', 'pagos']),
            monitor: new Set(['usuarios', 'empleados', 'salas', 'horarios', 'actividades', 'reservas', 'material', 'incidencias', 'pagos']),
        };
        const entityLabelsByRole = {
            cliente: {
                usuarios: 'Perfil',
                reservas: 'Mis reservas',
                pagos: 'Mis pagos',
            },
        };
        const allowedEntities = allowedEntitiesByRole[role] || null;
        const entityLabels = entityLabelsByRole[role] || {};

        if (token) {
            authLink.textContent = 'Logout';
            authLink.href = '#';
            authLink.addEventListener('click', (e) => { e.preventDefault(); ApiService.logout(); });
        } else {
            authLink.textContent = 'Login';
            authLink.href = '/login';
        }

        // Protege rutas del frontend: redirige a /login si no hay token
        const path = window.location.pathname;
        const currentEntity = path.startsWith('/seccion/') ? path.split('/')[2] : null;
        const isProtected = (path === '/' || path.startsWith('/dashboard') || path.startsWith('/seccion'));
        
        // Si es cliente y trata de acceder a / (Resumen) o /dashboard, redirigir a Perfil
        if (role === 'cliente' && (path === '/' || path.startsWith('/dashboard'))) {
            window.location.href = '/seccion/usuarios';
            return;
        }
        
        if (isProtected && !token && path !== '/login') {
            window.location.href = '/login';
            return;
        }

        if (currentEntity && allowedEntities && !allowedEntities.has(currentEntity)) {
            window.location.href = '/seccion/usuarios';
            return;
        }

        // Ocultar Resumen para clientes
        if (role === 'cliente') {
            const navLinks = document.querySelectorAll('.topbar-nav a');
            navLinks.forEach((link) => {
                const linkPath = new URL(link.href, window.location.origin).pathname;
                if (linkPath === '/') {
                    link.style.display = 'none';
                }
            });
        }

        if (token && ApiService.isClient && ApiService.isClient()) {
            const clientVisibleEntities = new Set(['actividades', 'salas', 'horarios', 'material']);
            document.querySelectorAll('[data-nav-entity]').forEach((link) => {
                if (!clientVisibleEntities.has(link.dataset.navEntity)) {
                    link.style.display = 'none';
                }
            });
        }

        // Intercepta clicks en la nav: si no hay token, redirige a /login
        const navLinks = document.querySelectorAll('.topbar-nav a');
        navLinks.forEach((link) => {
            // compute link path relative to origin
            try {
                const linkPath = new URL(link.href, window.location.origin).pathname;
                // mark active if matches current path
                if (link.id !== 'auth-link' && (linkPath === path || (linkPath !== '/' && path.startsWith(linkPath)))) {
                    link.classList.add('active');
                }

                if (linkPath.startsWith('/seccion/') && link.id !== 'auth-link') {
                    const entity = linkPath.split('/')[2];
                    if (allowedEntities && !allowedEntities.has(entity)) {
                        link.style.display = 'none';
                        return;
                    }
                    if (entityLabels[entity]) {
                        link.textContent = entityLabels[entity];
                    }
                }
            } catch (e) {
                // ignore invalid hrefs
            }

            link.addEventListener('click', (e) => {
                const href = link.getAttribute('href');
                if (!href) return;
                // Only protect internal routes
                if (href.startsWith('/') && href !== '/login' && !ApiService.getToken()) {
                    e.preventDefault();
                    window.location.href = '/login';
                    return;
                }

                if (href.startsWith('/seccion/') && allowedEntities) {
                    const entity = href.split('/')[2];
                    if (!allowedEntities.has(entity)) {
                        e.preventDefault();
                        window.location.href = '/seccion/usuarios';
                    }
                }
            });
        });
    });
    </script>
</body>
</html>
