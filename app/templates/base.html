<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MYSGYM{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <script>
        window.MYSGYM_CONFIG = window.MYSGYM_CONFIG || {};
    </script>
    <script src="{{ url_for('static', filename='js/config.js') }}?v=20260423"></script>
    <script src="{{ url_for('static', filename='js/api.js') }}?v=20260423"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}?v=20260423"></script>
</head>
<body>
    <header class="topbar">
        <a class="topbar-brand" href="{{ url_for('frontend.home') }}">MYSGYM</a>
        <nav class="topbar-nav">
            <a class="{% if active_page == 'home' %}active{% endif %}" href="{{ url_for('frontend.home') }}">Resumen</a>

            {% for item in nav_items %}
                <a class="{% if active_page == item.key %}active{% endif %}"
                   href="{{ item.url }}"
                   data-nav-entity="{{ item.key }}">
                   {{ item.title }}
                </a>
            {% endfor %}

            <a id="auth-link" href="{{ url_for('frontend.login') }}">Login</a>
        </nav>
    </header>

    <main class="page">
        {% block body %}{% endblock %}
    </main>

    <!-- Tu script completo se queda igual -->
    <script>
        /* ... todo tu JS ... */
    </script>
</body>
</html>
